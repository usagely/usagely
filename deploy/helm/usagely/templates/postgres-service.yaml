{{- if .Values.postgresql.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "usagely.fullname" . }}-postgres
  labels:
    {{- include "usagely.labels" . | nindent 4 }}
    app.kubernetes.io/component: postgres
spec:
  type: ClusterIP
  ports:
    - port: 5432
      targetPort: 5432
  selector:
    {{- include "usagely.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: postgres
{{- end }}
