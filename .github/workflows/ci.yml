name: ci

on:
  pull_request:
  push:
    branches: [main]

jobs:
  verify:
    name: make verify
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: server/go.mod
          cache-dependency-path: server/go.sum

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.0.0
          run_install: false

      - name: Get pnpm store path
        id: pnpm-store
        shell: bash
        run: echo "path=$(pnpm store path --silent)" >> "$GITHUB_OUTPUT"

      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm-store.outputs.path }}
          key: ${{ runner.os }}-pnpm-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-

      - name: Install workspace deps
        run: pnpm install --frozen-lockfile

      - name: gofmt check
        run: |
          set -euo pipefail
          out=$(gofmt -l server/ 2>&1)
          if [ -n "$out" ]; then
            echo "::error::gofmt found unformatted files:"
            echo "$out" | sed 's/^/  - /'
            exit 1
          fi

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v7
        with:
          version: v2.6.1
          working-directory: server
          args: --timeout=5m

      - name: Frontend tests with coverage
        run: pnpm --filter web test --run --coverage --coverage.reporter=lcov

      - name: Frontend build
        run: pnpm --filter web build

      - name: Backend tests with coverage
        working-directory: server
        run: go test ./... -coverprofile=../coverage-go.out -covermode=atomic

      - name: Backend vet
        working-directory: server
        run: go vet ./...

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          files: ./coverage-go.out,./apps/web/coverage/lcov.info
          flags: backend,frontend
          fail_ci_if_error: false

      - name: Tenancy lint (handler raw SQL must include org_id)
        run: cd server && go test -run TestTenancyLint ./internal/handler/...

      - name: Migration sanity (no edits to committed migrations)
        if: github.event_name == 'pull_request'
        env:
          BASE_REF: ${{ github.event.pull_request.base.ref }}
        run: |
          set -euo pipefail
          git fetch --no-tags --depth=1 origin "$BASE_REF"
          changed=$(git diff --name-only --diff-filter=MD "origin/$BASE_REF"...HEAD -- 'server/migrations/*.sql' || true)
          if [ -n "$changed" ]; then
            echo "::error::Pre-existing migration files were modified or deleted:"
            echo "$changed" | sed 's/^/  - /'
            echo "::error::Migrations are append-only. Add a new NNNN_*.up.sql + .down.sql pair instead."
            exit 1
          fi

      - name: Forbidden patterns
        run: |
          set -euo pipefail
          if grep -REn \
              --exclude-dir=node_modules \
              --exclude-dir=.git \
              --exclude-dir=.next \
              --exclude-dir=.turbo \
              --exclude-dir=dist \
              --exclude-dir=.sandcastle \
              --exclude-dir=.pnpm-store \
              --exclude=ci.yml \
              --exclude=GUARDRAILS.md \
              --exclude=AGENTS.md \
              --exclude='*.down.sql' \
              -e '--no-verify' \
              -e 'git push --force[^-]' \
              -e 'git reset --hard' \
              -e 'DROP TABLE' \
              -e 'TRUNCATE TABLE' \
              -e 'JWT_SECRET=[A-Za-z0-9]{16,}' \
              -- . ; then
            echo "::error::Forbidden pattern matched (see lines above). See GUARDRAILS.md."
            exit 1
          fi

      - name: Secret scan (gitleaks OSS)
        run: |
          set -euo pipefail
          GITLEAKS_VERSION="8.21.2"
          curl -sSfL "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz" \
            | tar -xz -C /tmp gitleaks
          /tmp/gitleaks detect --source . --no-banner --redact --verbose
