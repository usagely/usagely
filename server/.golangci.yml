version: "2"

run:
  timeout: 5m

linters:
  default: none
  enable:
    - govet
    - ineffassign
    - staticcheck
    - unused

  exclusions:
    rules:
      - path: '_test\.go'
        linters:
          - unused
      # SA1029: should not use built-in type string as key for value.
      # Three pre-existing call sites in middleware and a test. Tracked as
      # tech debt; suppress for now to keep the baseline green.
      - linters:
          - staticcheck
        text: "SA1029:"
      # ST1000: missing package doc comment. Repo-wide style cleanup, not
      # in scope for an enforcement-only PR.
      - linters:
          - staticcheck
        text: "ST1000:"
